name: Scrape SEC Form 4 insider trades

# Runs daily and commits any new filings back to the repo.
on:
  schedule:
    - cron: "0 11 * * *"   # every day at 11:00 UTC (7am ET)
  workflow_dispatch: {}     # also lets you run it manually from the Actions tab

permissions:
  contents: write           # needed so the job can commit updated data back

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the scraper
        run: python scraper.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          # only commit if something actually changed
          git diff --staged --quiet || git commit -m "Daily Form 4 scrape: ${{ github.run_id }}"
          git push
